repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [check, src/, tests/]
      - id: ruff-format
        args: [--check, src/, tests/]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [src/, --ignore-missing-imports]
        additional_dependencies: [types-pyyaml]
